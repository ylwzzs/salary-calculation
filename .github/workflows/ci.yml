name: Build & Push to 天翼云镜像仓库

# 国内构建（ADR-013）：test 跑 GitHub 美国 runner；build/deploy 跑国内 self-hosted runner。
# build 用普通 docker build/push（走 daemon：自动用镜像源 + 自动层缓存，不跨境、不卡）。

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: registry-crs-xinan1.ctyun.cn
  NAMESPACE: hookflow
  BACKEND_IMAGE: salary-backend
  FRONTEND_IMAGE: salary-frontend

jobs:
  # ───────── 测试（GitHub 美国 runner）─────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          pip install -r requirements.txt
          pip install -e ".[dev,web]"
      - run: pytest -q

      # 前端类型检查 + 构建（H4：防前端类型错误/构建失败悄悄合 main）
      # vitest 因 vitest4+jsdom+node 环境兼容问题暂缓，待修后加 npx vitest run
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend build (tsc + vite)
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ───────── 构建 & 推送后端镜像（国内 self-hosted runner）─────────
  build-backend:
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to 天翼云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build & Push Backend
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.BACKEND_IMAGE }}
        run: |
          docker build -f deploy/Dockerfile.backend -t "$IMG:latest" -t "$IMG:${{ github.sha }}" .
          docker push "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"

  # ───────── 构建 & 推送前端镜像（国内 self-hosted runner）─────────
  build-frontend:
    needs: test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to 天翼云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - name: Build & Push Frontend
        env:
          IMG: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.FRONTEND_IMAGE }}
        run: |
          docker build -f deploy/Dockerfile.frontend -t "$IMG:latest" -t "$IMG:${{ github.sha }}" .
          docker push "$IMG:latest"
          docker push "$IMG:${{ github.sha }}"

  # ───────── 自动部署（SSH 部署机 pull + up）─────────
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/salary
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "部署完成: $(date)"
